<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<title>NIXUS License Server</title>
<style>
body{background:#000;color:#fff;font-family:monospace;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;}
.box{text-align:center;}
.logo{font-size:11px;letter-spacing:0.3em;color:rgba(0,170,255,0.6);margin-bottom:12px;}
h1{font-size:20px;margin-bottom:8px;}
p{color:rgba(255,255,255,0.3);font-size:12px;letter-spacing:0.1em;}
.dot{width:8px;height:8px;background:#00ff88;border-radius:50%;display:inline-block;margin-right:8px;}
</style>
</head>
<body>
<div class="box">
  <div class="logo">NIXUS SYSTEM</div>
  <h1>License Server</h1>
  <p><span class="dot"></span>ONLINE</p>
</div>
