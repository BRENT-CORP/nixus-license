<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NIXUS — License Portal</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#000;font-family:ui-sans-serif,system-ui,sans-serif;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
  .logo{font-size:10px;letter-spacing:0.4em;color:rgba(0,170,255,0.5);font-weight:800;margin-bottom:10px;text-align:center;}
  h1{font-size:26px;font-weight:700;text-align:center;margin-bottom:6px;}
  .tagline{font-size:11px;color:rgba(255,255,255,0.25);letter-spacing:0.2em;text-align:center;margin-bottom:48px;}
  .card{width:100%;max-width:460px;background:rgba(8,8,20,0.95);border:1px solid rgba(255,255,255,0.07);border-radius:24px;padding:36px 32px 32px;}
  label{font-size:10px;letter-spacing:0.18em;color:rgba(255,255,255,0.3);font-weight:600;display:block;margin-bottom:8px;}
  input{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:14px 16px;font-size:14px;color:#fff;outline:none;letter-spacing:0.08em;font-family:monospace;transition:border-color 0.2s;margin-bottom:16px;}
  input:focus{border-color:rgba(0,170,255,0.4);}
  input::placeholder{color:rgba(255,255,255,0.12);}
  button{width:100%;padding:14px;border-radius:12px;background:rgba(0,170,255,0.15);border:1px solid rgba(0,170,255,0.35);color:#00aaff;font-size:11px;font-weight:800;letter-spacing:0.22em;cursor:pointer;transition:all 0.2s;}
  button:hover{background:rgba(0,170,255,0.25);}
  button:disabled{opacity:0.4;cursor:not-allowed;}
  #result{margin-top:24px;display:none;}
  .status-box{border-radius:16px;padding:24px;text-align:center;}
  .active{background:rgba(0,255,136,0.05);border:1px solid rgba(0,255,136,0.2);}
  .expired{background:rgba(248,113,113,0.05);border:1px solid rgba(248,113,113,0.2);}
  .invalid{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);}
  .status-icon{font-size:28px;margin-bottom:12px;}
  .status-label{font-size:10px;letter-spacing:0.25em;font-weight:800;margin-bottom:8px;}
  .active .status-label{color:#00ff88;}
  .expired .status-label{color:#f87171;}
  .invalid .status-label{color:rgba(255,255,255,0.3);}
  .status-key{font-family:monospace;font-size:12px;color:rgba(255,255,255,0.3);margin-bottom:16px;letter-spacing:0.05em;}
  .days-badge{display:inline-block;background:rgba(0,255,136,0.1);border:1px solid rgba(0,255,136,0.25);border-radius:100px;padding:6px 18px;font-size:13px;font-weight:700;color:#00ff88;margin-bottom:4px;}
  .days-sub{font-size:11px;color:rgba(255,255,255,0.25);margin-top:6px;}
  .divider{width:40px;height:1px;background:rgba(255,255,255,0.08);margin:16px auto;}
  .contact{font-size:11px;color:rgba(255,255,255,0.25);line-height:1.8;text-align:center;}
  .contact a{color:rgba(0,170,255,0.6);text-decoration:none;}
  .contact a:hover{color:#00aaff;}
  .motto{font-size:10px;letter-spacing:0.25em;color:rgba(255,255,255,0.12);margin-top:8px;font-style:italic;}
  .footer{margin-top:32px;font-size:10px;color:rgba(255,255,255,0.1);letter-spacing:0.15em;text-align:center;}
</style>
</head>
<body>
<div class="logo">NIXUS SYSTEM</div>
<h1>License Portal</h1>
<p class="tagline">COGITO ERGO SUM</p>

<div class="card">
  <label>ENTER YOUR LICENSE KEY</label>
  <input id="key" type="text" placeholder="NIXUS-XXXX-XXXX-XXXX-XXXX" maxlength="24" autocomplete="off" spellcheck="false"/>
  <button id="btn" onclick="checkKey()">CHECK STATUS</button>

  <div id="result">
    <div id="status-box" class="status-box">
      <div class="status-icon" id="icon"></div>
      <div class="status-label" id="label"></div>
      <div class="status-key" id="keyDisplay"></div>
      <div id="activeContent" style="display:none">
        <div class="days-badge" id="daysBadge"></div>
        <div class="days-sub">days remaining on your license</div>
      </div>
      <div id="expiredContent" style="display:none">
        <div class="divider"></div>
        <div class="contact">
          Your license has expired or is invalid.<br/>
          To renew or get support, contact NIXUS:<br/><br/>
          <a href="mailto:rahsoziek@gmail.com">rahsoziek@gmail.com</a>
        </div>
        <div class="motto">COGITO ERGO SUM</div>
      </div>
    </div>
  </div>
</div>

<div class="footer">NIXUS © 2026 — ALL RIGHTS RESERVED</div>

<script>
  const inp = document.getElementById('key');
  inp.addEventListener('keydown', e => { if(e.key==='Enter') checkKey(); });

  async function checkKey() {
    const raw = inp.value.replace(/[^a-zA-Z0-9]/g,'').toUpperCase();
    if (!raw) return;
    const key = [raw.slice(0,5),raw.slice(5,9),raw.slice(9,13),raw.slice(13,17),raw.slice(17,21)].filter(p=>p).join('-');

    const btn = document.getElementById('btn');
    btn.disabled = true; btn.textContent = 'CHECKING...';

    try {
      const res = await fetch('/api/status?key=' + encodeURIComponent(key));
      const data = await res.json();
      showResult(key, data);
    } catch(e) {
      showResult(key, { valid: false, status: 'error' });
    }
    btn.disabled = false; btn.textContent = 'CHECK STATUS';
  }

  function showResult(key, data) {
    const box = document.getElementById('status-box');
    const icon = document.getElementById('icon');
    const label = document.getElementById('label');
    const keyDisplay = document.getElementById('keyDisplay');
    const activeContent = document.getElementById('activeContent');
    const expiredContent = document.getElementById('expiredContent');
    const daysBadge = document.getElementById('daysBadge');

    const active = data.valid && data.status === 'active';
    box.className = 'status-box ' + (active ? 'active' : 'expired');
    icon.textContent = active ? '✓' : '✗';
    label.textContent = active ? 'LICENSE ACTIVE' : (data.status === 'expired' ? 'LICENSE EXPIRED' : 'INVALID / NOT FOUND');
    keyDisplay.textContent = key;

    if (active) {
      activeContent.style.display = 'block';
      expiredContent.style.display = 'none';
      daysBadge.textContent = data.days_left;
    } else {
      activeContent.style.display = 'none';
      expiredContent.style.display = 'block';
    }

    document.getElementById('result').style.display = 'block';
  }
</script>
</body>
</html>
